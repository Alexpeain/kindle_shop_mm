<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>{% block title %}Kindle Cases{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Swiper.js CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

    <style>
      /* ── Reset & Base ── */
      *, *::before, *::after { box-sizing: border-box; }
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        padding: 0;
        background: #f5f5f5;
      }

      /* ── Header ── */
      header {
        background: #111827;
        color: #fff;
        padding: 16px 24px;
      }
      header strong {
        font-size: 18px;
        letter-spacing: 0.5px;
      }

      /* ── Main Layout ── */
      main {
        padding: 24px;
        max-width: 960px;
        margin: 0 auto;
      }

      /* ── Product Grid (listing page) ── */
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
      }
      .card {
        background: #fff;
        border-radius: 8px;
        padding: 16px;
        box-shadow: 0 1px 3px rgba(0,0,0,.08);
        text-decoration: none;
        color: inherit;
        display: block;
        transition: box-shadow 0.2s;
      }
      .card:hover {
        box-shadow: 0 4px 12px rgba(0,0,0,.15);
      }

      /* ── Buttons ── */
      .btn {
        display: inline-block;
        padding: 8px 14px;
        background: #111827;
        color: #fff;
        text-decoration: none;
        border-radius: 4px;
        font-size: 14px;
        border: none;
        cursor: pointer;
      }
      .btn-outline {
        display: inline-block;
        padding: 8px 14px;
        background: transparent;
        color: #111827;
        border: 1px solid #111827;
        text-decoration: none;
        border-radius: 4px;
        font-size: 14px;
        cursor: pointer;
      }

      /* ── Forms ── */
      form input,
      form textarea,
      form select {
        width: 100%;
        margin-bottom: 8px;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-size: 14px;
      }
      form input:focus,
      form textarea:focus,
      form select:focus {
        outline: none;
        border-color: #111827;
      }

      /* ══════════════════════════════════════
         SWIPER — Product Image Gallery
         Used on the product detail page
      ══════════════════════════════════════ */

      /* Main large image swiper */
      .product-swiper-main {
        width: 100%;
        border-radius: 10px;
        overflow: hidden;
        margin-bottom: 10px;
        background: #fff;
      }
      .product-swiper-main .swiper-slide img {
        width: 100%;
        height: 420px;
        object-fit: cover;
        display: block;
      }

      /* Thumbnail strip swiper */
      .product-swiper-thumbs {
        width: 100%;
        padding: 4px 0;
      }
      .product-swiper-thumbs .swiper-slide {
        width: 80px;
        height: 80px;
        border-radius: 6px;
        overflow: hidden;
        cursor: pointer;
        opacity: 0.5;
        border: 2px solid transparent;
        transition: opacity 0.2s, border-color 0.2s;
      }
      .product-swiper-thumbs .swiper-slide-thumb-active {
        opacity: 1;
        border-color: #111827;
      }
      .product-swiper-thumbs .swiper-slide img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      /* Swiper nav arrows */
      .swiper-button-next,
      .swiper-button-prev {
        color: #111827;
        background: rgba(255,255,255,0.85);
        width: 36px;
        height: 36px;
        border-radius: 50%;
        box-shadow: 0 2px 6px rgba(0,0,0,.15);
      }
      .swiper-button-next::after,
      .swiper-button-prev::after {
        font-size: 14px;
        font-weight: bold;
      }

      /* ── Mobile ── */
      @media (max-width: 600px) {
        .product-swiper-main .swiper-slide img {
          height: 280px;
        }
        .product-swiper-thumbs .swiper-slide {
          width: 60px;
          height: 60px;
        }
      }
    </style>
  </head>

  <body>
    <header>
      <strong>Kindle Art Cases</strong>
    </header>

    <main>
      {% block content %}{% endblock %}
    </main>

    <!-- Swiper.js JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <!-- Swiper init — only runs if .product-swiper-main exists on the page -->
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        if (document.querySelector('.product-swiper-main')) {

          // Thumbnail swiper (must init first)
          const thumbSwiper = new Swiper('.product-swiper-thumbs', {
            slidesPerView: 'auto',
            spaceBetween: 8,
            watchSlidesProgress: true,
          });

          // Main image swiper
          const mainSwiper = new Swiper('.product-swiper-main', {
            loop: true,
            navigation: {
              nextEl: '.swiper-button-next',
              prevEl: '.swiper-button-prev',
            },
            thumbs: {
              swiper: thumbSwiper,
            },
          });
        }
      });
    </script>

    {% block extra_js %}{% endblock %}
  </body>
</html>
